<div class="overlay" *ngIf="produto">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-icone">&#9888;</div>
    <h2 class="modal-titulo">Confirmar Exclusão</h2>
    <p class="modal-texto">
      Você está prestes a excluir o produto:<br>
      <strong class="produto-nome">{{ produto.nome }}</strong>
    </p>
    <p class="modal-aviso">Essa ação não pode ser desfeita.</p>
    <div class="modal-acoes">
      <button class="btn-cancelar" (click)="cancelar.emit()">Cancelar</button>
      <button class="btn-confirmar" (click)="confirmar.emit()">Confirmar</button>
    </div>
  </div>
</div>
