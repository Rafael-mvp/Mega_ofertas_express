<header class="header">
  <div class="header-inner">
    <a routerLink="/" class="logo">
      <img src="assets/img/Mega_ofertaIMG.png" alt="MegaOfertas" class="logo-img" />
    </a>

    <div class="search-bar">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Buscar produtos..."
        class="search-input"
      />
      <button class="search-btn" aria-label="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
      </button>
    </div>

    <a routerLink="/admin" class="admin-link">Admin</a>

    @if (clienteLogado) {
      <div class="auth-user">
        <span class="user-nome">Olá, {{ clienteLogado.nome.split(' ')[0] }}</span>
        <button class="btn-sair" (click)="auth.logout()">Sair</button>
      </div>
    } @else {
      <div class="auth-links">
        <a routerLink="/login" class="auth-link">Login</a>
        <a routerLink="/cadastro" class="auth-link auth-link-destaque">Cadastrar</a>
      </div>
    }

    <a routerLink="/carrinho" class="cart-btn" aria-label="Carrinho">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.6 8H19M9 21a1 1 0 1 0 2 0 1 1 0 0 0-2 0zm9 0a1 1 0 1 0 2 0 1 1 0 0 0-2 0z" />
      </svg>
      @if (cartCount > 0) {
        <span class="cart-badge">{{ cartCount }}</span>
      }
    </a>
  </div>
</header>

<main>
  <router-outlet />
</main>

<footer class="footer">
  <p>© 2025 MegaOfertas — Todos os direitos reservados</p>
</footer>

<app-toast />
